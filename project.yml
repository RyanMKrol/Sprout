name: Sprout
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    # Device builds sign automatically; the DEVELOPMENT_TEAM comes from a local,
    # gitignored xcconfig (see Config/Signing.xcconfig) so no personal team ID is
    # committed. When that file is absent (harness/CI), simulator builds need no
    # team and are unaffected.
    CODE_SIGN_STYLE: Automatic
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Sprout:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Sources/Fonts
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Sprout
        UIAppFonts:
          - bricolage-grotesque-v9-latin-600.ttf
          - bricolage-grotesque-v9-latin-700.ttf
          - bricolage-grotesque-v9-latin-800.ttf
          - hanken-grotesk-v12-latin-500.ttf
          - hanken-grotesk-v12-latin-500italic.ttf
          - hanken-grotesk-v12-latin-600.ttf
          - hanken-grotesk-v12-latin-700.ttf
          - hanken-grotesk-v12-latin-italic.ttf
          - hanken-grotesk-v12-latin-regular.ttf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # T015: weather adaptation reads the device location to fetch a local forecast.
        NSLocationWhenInUseUsageDescription: "Sprout uses your location to fetch the local forecast and adjust each plant's watering schedule for hot and cold spells."
        # T205: the sequential photo flow takes a photo of each plant you add.
        NSCameraUsageDescription: "Sprout uses the camera to take a photo of each plant you add."
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.sprout
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SproutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Sprout
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.sprout.tests
schemes:
  Sprout:
    build:
      targets:
        Sprout: all
        SproutTests: [test]
    test:
      targets:
        - SproutTests
      gatherCoverageData: false
