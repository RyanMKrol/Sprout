name: Sprout
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Sprout:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Sprout
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # T015: weather adaptation reads the device location to fetch a local forecast.
        NSLocationWhenInUseUsageDescription: "Sprout uses your location to fetch the local forecast and adjust each plant's watering schedule for hot and cold spells."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.sprout
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SproutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Sprout
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.sprout.tests
schemes:
  Sprout:
    build:
      targets:
        Sprout: all
        SproutTests: [test]
    test:
      targets:
        - SproutTests
      gatherCoverageData: false
