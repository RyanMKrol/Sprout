name: CI
# ▲ The loop gates on a workflow whose `name:` matches CI_WORKFLOW (default "CI").
#   If you rename this, set CI_WORKFLOW to match in scripts/harness.env.

# Run on every push (so the loop's per-task branches get a run to watch) and on PRs
# to main. The loop merges a branch into `main` ONLY when this workflow goes green.
on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Definition of Done
    # iOS apps need a macOS runner with Xcode + the iOS Simulator toolchain.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift tooling
        run: brew install swiftlint swiftformat

      - name: Format check
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint --strict

      # `xcodebuild test` builds the app before running unit tests, so it doubles as
      # the build gate — there is no separate build step.
      - name: Test
        run: |
          xcodebuild test \
            -project Sprout.xcodeproj \
            -scheme Sprout \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
